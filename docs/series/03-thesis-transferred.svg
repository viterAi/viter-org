<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- Layer colors — consistent for L0..L3 across the series -->
    <linearGradient id="L0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="L1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="L2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="L3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
    <marker id="bigArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>

  <!-- Top bar -->
  <text x="80" y="80" font-size="24" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">vita</text>
  <text x="80" y="105" font-size="13" fill="#64748b" letter-spacing="3">VITER · BUILD CHRONICLE · 2026-05-04</text>
  <g transform="translate(1520, 70)">
    <rect x="-50" y="-25" width="100" height="42" rx="21" fill="none" stroke="#334155"/>
    <text x="0" y="5" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">3 / 6</text>
  </g>

  <!-- Title -->
  <text x="80" y="180" font-size="56" font-weight="800" fill="#f8fafc" letter-spacing="-1">Thesis transferred</text>
  <text x="80" y="218" font-size="20" fill="#94a3b8">The L0→L3 architecture didn't change. The substrate did.</text>

  <!-- ============ COLUMN HEADERS ============ -->
  <g transform="translate(60, 270)">
    <text x="0" y="0" font-size="14" font-weight="800" fill="#94a3b8" letter-spacing="3">BEFORE</text>
    <text x="0" y="32" font-size="28" font-weight="800" fill="#cbd5e1">viter-workspace</text>
    <text x="0" y="58" font-size="15" fill="#64748b" font-style="italic">~14 days · markdown in folders · personal prosthetic</text>
  </g>

  <g transform="translate(880, 270)">
    <text x="0" y="0" font-size="14" font-weight="800" fill="#fbbf24" letter-spacing="3">AFTER · TODAY</text>
    <text x="0" y="32" font-size="28" font-weight="800" fill="#f8fafc">vita</text>
    <text x="0" y="58" font-size="15" fill="#cbd5e1" font-style="italic">~11 hours · Postgres tables · platform substrate</text>
  </g>

  <!-- ============ ROW: L0 ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="350" width="660" height="130" rx="12" fill="url(#L0)" opacity="0.22" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <g transform="translate(60, 350)">
    <rect x="0" y="0" width="80" height="130" rx="12" fill="url(#L0)"/>
    <text x="40" y="78" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle">L0</text>
    <text x="105" y="35" font-size="14" font-weight="800" fill="#10b981" letter-spacing="2">RAW · IMMUTABLE</text>
    <text x="105" y="65" font-size="16" fill="#e2e8f0">Claude Code .jsonl files · WhatsApp zips · audio · screenpipe DB</text>
    <text x="105" y="92" font-size="13" font-family="ui-monospace, SF Mono, monospace" fill="#94a3b8">~/.claude/projects/*.jsonl  ·  ~/Downloads/WhatsApp*.zip</text>
    <text x="105" y="113" font-size="13" fill="#64748b" font-style="italic">scattered across folders, sitting on disk, format-native</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="350" width="660" height="130" rx="12" fill="url(#L0)" opacity="0.22" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <g transform="translate(880, 350)">
    <rect x="0" y="0" width="80" height="130" rx="12" fill="url(#L0)"/>
    <text x="40" y="78" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle">L0</text>
    <text x="105" y="35" font-size="14" font-weight="800" fill="#10b981" letter-spacing="2">l0_artifacts · sha256-deduped</text>
    <text x="105" y="65" font-size="16" fill="#e2e8f0">One row per artifact · bytes in Supabase Storage · idempotent</text>
    <text x="540" y="92" font-size="36" font-weight="800" fill="#10b981" text-anchor="end">59</text>
    <text x="540" y="112" font-size="11" fill="#64748b" text-anchor="end">rows live</text>
    <text x="105" y="113" font-size="13" fill="#94a3b8">queryable · multi-tenant · audit-trailed</text>
  </g>

  <!-- ============ ROW: L1 ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="500" width="660" height="130" rx="12" fill="url(#L1)" opacity="0.22" stroke="#06b6d4" stroke-width="1.5"/>
  </g>
  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="80" height="130" rx="12" fill="url(#L1)"/>
    <text x="40" y="78" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle">L1</text>
    <text x="105" y="35" font-size="14" font-weight="800" fill="#06b6d4" letter-spacing="2">PARSED · BY-DAY · MARKDOWN</text>
    <text x="105" y="65" font-size="16" fill="#e2e8f0">Each stream's per-day file · regenerated on SessionEnd</text>
    <text x="105" y="92" font-size="13" font-family="ui-monospace, SF Mono, monospace" fill="#94a3b8">chat-log/by-day/*-L1.md  ·  whatsapp/by-day/*-L1.md</text>
    <text x="105" y="113" font-size="13" fill="#64748b" font-style="italic">~30 days × 3 streams in markdown — readable, not joinable</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="500" width="660" height="130" rx="12" fill="url(#L1)" opacity="0.22" stroke="#06b6d4" stroke-width="1.5"/>
  </g>
  <g transform="translate(880, 500)">
    <rect x="0" y="0" width="80" height="130" rx="12" fill="url(#L1)"/>
    <text x="40" y="78" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle">L1</text>
    <text x="105" y="35" font-size="14" font-weight="800" fill="#06b6d4" letter-spacing="2">l1_events · universal shape</text>
    <text x="105" y="65" font-size="16" fill="#e2e8f0">One row per parsed event · per (artifact, facet, extractor) run</text>
    <text x="540" y="92" font-size="36" font-weight="800" fill="#06b6d4" text-anchor="end">22,428</text>
    <text x="540" y="112" font-size="11" fill="#64748b" text-anchor="end">rows · 118 runs</text>
    <text x="105" y="113" font-size="13" fill="#94a3b8">SQL-joinable · embeddings-ready · history audit</text>
  </g>

  <!-- ============ ROW: L2 ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="650" width="660" height="130" rx="12" fill="url(#L2)" opacity="0.22" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <g transform="translate(60, 650)">
    <rect x="0" y="0" width="80" height="130" rx="12" fill="url(#L2)"/>
    <text x="40" y="78" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle">L2</text>
    <text x="105" y="35" font-size="14" font-weight="800" fill="#f59e0b" letter-spacing="2">SYNTHESIS · LLM-WRITTEN</text>
    <text x="105" y="65" font-size="16" fill="#e2e8f0">Per-day decisions, framings, state shifts · footnotes to L1</text>
    <text x="105" y="92" font-size="13" font-family="ui-monospace, SF Mono, monospace" fill="#94a3b8">chat-log/by-day/*-L2.md  ·  manual LLM trigger</text>
    <text x="105" y="113" font-size="13" fill="#64748b" font-style="italic">citation-enforced via skill — but ungraded</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="650" width="660" height="130" rx="12" fill="url(#L2)" opacity="0.22" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <g transform="translate(880, 650)">
    <rect x="0" y="0" width="80" height="130" rx="12" fill="url(#L2)"/>
    <text x="40" y="78" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle">L2</text>
    <text x="105" y="35" font-size="14" font-weight="800" fill="#f59e0b" letter-spacing="2">l2_syntheses · citation gate</text>
    <text x="105" y="65" font-size="16" fill="#e2e8f0">Same shape · plus self-graded on 11-point rubric · llm_call_log</text>
    <text x="540" y="92" font-size="36" font-weight="800" fill="#f59e0b" text-anchor="end">2</text>
    <text x="540" y="112" font-size="11" fill="#64748b" text-anchor="end">rows · 8 eval runs</text>
    <text x="105" y="113" font-size="13" fill="#94a3b8">scopers: day · meeting · person · concept · thread</text>
  </g>

  <!-- ============ ROW: L3 ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="800" width="660" height="130" rx="12" fill="url(#L3)" opacity="0.22" stroke="#ec4899" stroke-width="1.5"/>
  </g>
  <g transform="translate(60, 800)">
    <rect x="0" y="0" width="80" height="130" rx="12" fill="url(#L3)"/>
    <text x="40" y="78" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle">L3</text>
    <text x="105" y="35" font-size="14" font-weight="800" fill="#ec4899" letter-spacing="2">FUSION · SURFACES</text>
    <text x="105" y="65" font-size="16" fill="#e2e8f0">_now · _decisions · _quotes · _people/* · _concepts/*</text>
    <text x="105" y="92" font-size="13" font-family="ui-monospace, SF Mono, monospace" fill="#94a3b8">l3/_now.md  ·  regenerated by Python index-l3 script</text>
    <text x="105" y="113" font-size="13" fill="#64748b" font-style="italic">Mordechai's prosthetic — runs locally, not shareable</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="800" width="660" height="130" rx="12" fill="url(#L3)" opacity="0.22" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="6 4"/>
  </g>
  <g transform="translate(880, 800)">
    <rect x="0" y="0" width="80" height="130" rx="12" fill="url(#L3)"/>
    <text x="40" y="78" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle">L3</text>
    <text x="105" y="35" font-size="14" font-weight="800" fill="#ec4899" letter-spacing="2">l3_surfaces · schema only</text>
    <text x="105" y="65" font-size="16" fill="#e2e8f0">Indexer not yet built — Trigger.dev will compose on L2 insert</text>
    <text x="540" y="92" font-size="36" font-weight="800" fill="#ec4899" text-anchor="end">0</text>
    <text x="540" y="112" font-size="11" fill="#64748b" text-anchor="end">rows · tomorrow's work</text>
    <text x="105" y="113" font-size="13" fill="#94a3b8">queryable by Jeffrey, Shaul, Yitzchak — once the indexer ships</text>
  </g>

  <!-- ============ TRANSFER ARROW ============ -->
  <g transform="translate(720, 590)">
    <line x1="40" y1="50" x2="140" y2="50" stroke="#fbbf24" stroke-width="4" marker-end="url(#bigArrow)"/>
    <text x="90" y="35" font-size="12" font-weight="800" fill="#fbbf24" letter-spacing="3" text-anchor="middle">TRANSFERRED</text>
    <text x="90" y="78" font-size="11" fill="#94a3b8" text-anchor="middle">2026-05-04</text>
  </g>

  <!-- ============ FOOTER PUNCH ============ -->
  <text x="800" y="1000" font-size="20" fill="#cbd5e1" text-anchor="middle" font-style="italic">
    Same L0→L3 shape. Same citation discipline. Different medium — and a medium that scales beyond one person.
  </text>

  <!-- Series TOC -->
  <line x1="80" y1="1060" x2="1520" y2="1060" stroke="#1e293b"/>
  <g font-size="12" fill="#475569">
    <text x="80"   y="1085">1 · Cover</text>
    <text x="240"  y="1085">2 · The 24h shock</text>
    <text x="430"  y="1085" fill="#f8fafc" font-weight="700">3 · Thesis transferred</text>
    <text x="650"  y="1085">4 · The day, in four stages</text>
    <text x="930"  y="1085">5 · One trace</text>
    <text x="1100" y="1085">6 · What's live, what's next</text>
  </g>
  <text x="1520" y="1085" font-size="11" fill="#475569" text-anchor="end">Mordechai Potash · viter · Asia/Jerusalem</text>
</svg>
